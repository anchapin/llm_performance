name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Run CI build and test script
        run: |
          chmod +x ./scripts/ci_build_and_test.sh
          ./scripts/ci_build_and_test.sh

  python-no-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: "pip-cache-${{ runner.os }}-$(sha1sum requirements.txt | cut -d' ' -f1)"
          restore-keys: |
            pip-cache-${{ runner.os }}-

      - name: Install pinned requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run no-docker smoke test
        run: |
          python tests/test_pipeline_nodocker.py
